services:
  aiclient:
    image: node:20-alpine
    working_dir: /app
    command: ["node", "src/core/master.js"]
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "18789:18789"
    volumes:
      - ..:/app
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  openclaw:
    image: justlikemaki/openclaw-docker-cn-im:latest
    restart: unless-stopped
    network_mode: "service:aiclient"
    depends_on:
      aiclient:
        condition: service_healthy
    environment:
      - API_KEY=123456
      - BASE_URL=http://localhost:3000/claude-kiro-oauth/v1
      - API_PROTOCOL=openai-completions
      - MODEL_ID=claude-opus-4-6
      - IMAGE_MODEL_ID=claude-sonnet-4-6
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_GATEWAY_PORT=18789
      - OPENCLAW_GATEWAY_TOKEN=123456
      - OPENCLAW_GATEWAY_DANGEROUSLY_DISABLE_DEVICE_AUTH=true
      - FEISHU_APP_ID=cli_a92d187342f91cb3
      - FEISHU_APP_SECRET=C4LL5JmPecNAGqb0ka9bsdaEYhKZUs8r
